    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            overflow-x: hidden;
            width: 100%;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            width: 100%;
        }

        /* ===== خلفية ثابتة - خفيفة جداً ===== */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                #0f172a;
            z-index: -1;
        }

        /* ===== الحاوية الرئيسية ===== */
        .links-container {
            max-width: 600px;
            width: 100%;
            position: relative;
            z-index: 10;
            margin: 0 auto;
        }

        /* ===== البطاقة الرئيسية ===== */
        .main-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 50px;
            padding: 35px 25px;
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.8);
            width: 100%;
        }

        /* ===== قسم البروفايل ===== */
        .profile-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .image-wrapper {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
        }

        .profile-image {
            width: 120%;
            height: 120%;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #8b5cf6;
            box-shadow: 0 20px 40px -10px #8b5cf6;
            transition: transform 0.3s ease;
        }

        .profile-image:hover {
            transform: scale(1.05);
            border-color: #ec4899;
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(to right, #ffffff, #ffffff, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }

        .username {
            display: inline-block;
            background: rgba(139, 92, 246, 0.15);
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 500;
            color: #8b5cf6;
            border: 1px solid rgba(139, 92, 246, 0.3);
            margin: 0 auto 10px;
        }

        /* ===== البريد الإلكتروني (إضافة جديدة) ===== */
        .email {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(236, 72, 153, 0.1);
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            color: #ec4899;
            border: 1px solid rgba(236, 72, 153, 0.3);
            margin: 15px auto 5px;
            text-decoration: none;
            direction: ltr;
            transition: all 0.3s ease;
        }

        .email:hover {
            background: rgba(236, 72, 153, 0.2);
            border-color: #ec4899;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px #ec4899;
        }

        .email i {
            font-size: 22px;
            color: #ec4899;
        }

        /* ===== عدادات ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 25px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 40px;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .stat-box {
            text-align: center;
            padding: 10px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 30px;
            transition: background 0.3s ease, transform 0.3s ease;
        }

        .stat-box:hover {
            background: rgba(139, 92, 246, 0.2);
            transform: translateY(-3px);
        }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: white;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 14px;
            color: #8b5cf6;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* ===== قائمة اللينكات - أنيميشن خفيف ===== */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }

        .link-item {
            text-decoration: none;
            display: block;
        }

        .link-content {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 70px;
            padding: 18px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.3s ease, transform 0.3s ease, border-color 0.3s ease;
        }

        .link-item:hover .link-content {
            background: #8b5cf6;
            border-color: white;
            transform: translateY(-3px);
        }

        .link-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .link-left i {
            font-size: 30px;
            width: 40px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .fa-facebook {
            color: #1877f2;
        }

        .fa-instagram {
            background: linear-gradient(45deg, #f09433, #d62976, #962fbf, #4f5bd5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .fa-tiktok {
            color: #ffffff;
        }

        .fa-youtube {
            color: #ff0000;
        }

        .fa-pinterest {
            color: #bd081c;
        }

        .fa-linkedin {
            color: #0a66c2;
        }

        .link-item:hover .link-left i {
            color: white !important;
            background: none !important;
            transform: scale(1.1);
        }

        .link-left span {
            font-size: 20px;
            font-weight: 600;
            color: white;
        }

        .link-arrow {
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .link-item:hover .link-arrow {
            color: white;
            transform: translateX(-5px);
        }

        /* ===== أزرار ===== */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-back,
        .btn-website {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: 2px solid;
        }

        .btn-back {
            background: rgba(139, 92, 246, 0.1);
            border-color: #8b5cf6;
            color: white;
        }

        .btn-back:hover {
            background: #8b5cf6;
            transform: translateY(-3px);
        }

        .btn-website {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-website:hover {
            background: white;
            border-color: white;
            color: #0f172a;
            transform: translateY(-3px);
        }

        /* ===== الفوتر ===== */
        .footer-links {
            margin-top: 30px;
            text-align: center;
            color: #475569;
            font-size: 14px;
            border-top: 1px solid rgba(139, 92, 246, 0.2);
            padding-top: 25px;
        }

        .footer-links i {
            color: #8b5cf6;
            margin: 0 3px;
        }

        /* ===== تحسينات الجوال ===== */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                padding-top: 30px;
            }

            .main-card {
                padding: 20px 15px;
                border-radius: 40px;
            }

            h1 {
                font-size: 36px;
            }

            .username {
                font-size: 16px;
                padding: 6px 20px;
            }

            .email {
                font-size: 16px;
                padding: 10px 20px;
            }

            .email i {
                font-size: 18px;
            }

            .image-wrapper {
                width: 120px;
                height: 120px;
            }

            .stat-number {
                font-size: 22px;
            }

            .stat-label {
                font-size: 12px;
            }

            .link-left i {
                font-size: 24px;
                width: 35px;
            }

            .link-left span {
                font-size: 18px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .link-content {
                padding: 15px 20px;
            }

            /* تعطيل الأنيميشن علىhover في الجوال عشان الأداء */
            .stat-box:hover,
            .link-item:hover .link-content,
            .btn-back:hover,
            .btn-website:hover,
            .profile-image:hover,
            .email:hover {
                transform: none;
            }

            /* بس خلينا اللون يتغير عشان الإحساس بالتفاعل */
            .link-item:hover .link-content {
                background: #8b5cf6;
            }
        }

        @media (max-width: 380px) {
            h1 {
                font-size: 30px;
            }

            .link-left {
                gap: 12px;
            }

            .link-left i {
                font-size: 20px;
                width: 30px;
            }

            .link-left span {
                font-size: 16px;
            }

            .stats-grid {
                gap: 5px;
                padding: 10px;
            }

            .email {
                font-size: 14px;
                padding: 8px 15px;
            }
        }
    </style>
</head>
